---
layout: default
---
<article>
  <header>
    <h1>{{ page.title }}</h1>
    <p class="meta">{{ page.date | date: "%B %d, %Y" }}{% if page.source_url %} &middot; <a href="{{ page.source_url }}">Original &rarr;</a>{% endif %}{% if page.tags.size > 0 %} &middot; {{ page.tags | join: ", " }}{% endif %}</p>
  </header>

  <div class="body">
    {{ content }}
  </div>

  <footer>
    <a href="{{ '/bookmarks/' | relative_url }}">&larr; All bookmarks</a>
  </footer>
</article>
