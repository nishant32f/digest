---
layout: default
---
<article class="digest">
  <header>
    <h1>{{ page.title }}</h1>
    <p class="meta">
      {{ page.date | date: "%B %d, %Y %l:%M %p %Z" }}
      {% if page.categories.size > 0 %}
        · {{ page.categories | join: ", " }}
      {% endif %}
    </p>
  </header>

  <div class="content">
    {{ content }}
  </div>

  <footer>
    <p><a href="{{ '/digests/' | relative_url }}">← All digests</a></p>
  </footer>
</article>
