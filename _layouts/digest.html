---
layout: default
---
<article>
  <header>
    <h1>{{ page.title }}</h1>
    <p class="meta">{{ page.date | date: "%B %d, %Y &middot; %l:%M %p %Z" }}{% if page.categories.size > 0 %} &middot; {{ page.categories | join: ", " }}{% endif %}</p>
  </header>

  <div class="body">
    {{ content }}
  </div>

  <footer>
    <a href="{{ '/digests/' | relative_url }}">&larr; All digests</a>
  </footer>
</article>
